apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deploy

spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service-container
        image: "spaul76/user-service:{{ .Values.image_tag }}"
        envFrom:
        - configMapRef:
            name: user-config
        - secretRef:
            name: user-secret
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 150Mi
          limits:
            cpu: 300m
            memory: 400Mi 
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
